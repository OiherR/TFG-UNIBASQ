<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Asistente - TFG</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">🏛️</div>
    <div class="brand-text">
      <div class="brand-title">Laguntzailea-TFG</div>
      <div class="brand-sub">Kontsulta-laguntzailea.</div>
    </div>
  </div>

  <div class="topbar-actions">
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="eu" type="button">EU</button>
      <button class="lang-btn" data-lang="es" type="button">ES</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <button class="primary" id="newQueryBtn" type="button">✎ Kontsulta berria</button>
    <button class="danger" id="clearHistoryBtn" type="button">🧹 Garbitu historiala</button>

    <div class="side-section">
      <div class="side-title">nire kontsultak</div>
      <div id="conversationsList"></div>
    </div>

    <div class="side-section">
      <div class="side-title">Laguntza</div>

      <a class="side-item"
         href="https://www.unibasq.eus/es/profesorado-acreditacion-del-pdi/mas-informacion/"
         target="_blank"
         rel="noopener noreferrer">
         UNIBASQen orria
      </a>

      <button class="side-item" id="sideAbout" type="button">
        ℹ️ Proiektuari buruz
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="title-row">
        <div class="bubble">💬</div>
        <div>
          <div class="main-title">Kontsulta berria</div>
          <div class="main-sub">
            Azken eguneraketa: <span id="updatedAt"></span>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" type="button">Elkarrizketa</button>
      </div>
    </div>

    <section class="chat-shell">
      <div id="chat" class="chat">
        <div class="empty">
          <div class="watermark">UPV/EHU</div>
          <div class="empty-text">
            Bilatu UNIBASQ-en dagoen informazioa hemendik
          </div>
        </div>
      </div>

      <div id="loading" class="loading-container" style="display:none;">
        <span>⏳ UNIBASQeko datuak aztertzen...</span>
      </div>

      <form id="form" class="composer">
        <div class="composer-inner">
          <span>💭</span>
          <input id="input" placeholder="Galdetu nahi duzuna" required />
          <button id="sendBtn" type="submit">Bidali</button>
        </div>
      </form>
    </section>
  </main>
</div>

<div class="modal-backdrop" id="aboutModal" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <h3 id="aboutModalTitle">Proiektuari buruz</h3>
      <button class="modal-close" id="closeAboutBtn" type="button" aria-label="Itxi">✕</button>
    </div>

    <div class="modal-body">
      <p id="aboutModalText">
        Aplikazio honek GraphRAG arkitektura erabiltzen du...
      </p>
    </div>
  </div>
</div>

<script src="/static/app.js?v=3"></script>
</body>
</html>
